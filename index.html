<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report User Trainer — Artificial Intelligence Sample</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── INTRO VIDEO OVERLAY (shown on page load) ── -->
  <div class="video-overlay" id="video-overlay">
    <div class="video-card">
      <button class="video-close" id="video-close" title="Close">&times;</button>
      <video id="intro-video" src="video/intro-video.mp4" autoplay muted playsinline></video>
      <button class="video-unmute" id="video-unmute" title="Unmute">🔇 Tap for sound</button>
    </div>
  </div>

  <!-- ── REPORT (full width) ── -->
  <main class="report-container">
    <iframe
      id="report-frame"
      title="Artificial Intelligence Sample — Power BI report"
      src="https://app.powerbi.com/reportEmbed?reportId=a736feb8-9429-41e6-b5cd-5a5977c0be7d&autoAuth=true&ctid=2ee548e1-6be8-4729-b86e-f482e29d2c9f"
      frameborder="0"
      allowfullscreen="true">
    </iframe>
  </main>

  <!-- ── ELEVENLABS WIDGET (floating, bottom-right) ── -->
  <elevenlabs-convai agent-id="agent_1401kx60pvr1f7t8sbr2tvpe0pds"></elevenlabs-convai>

  <!-- ── HUMAN TRAINER ESCALATION (modal, opened by the agent's tool call) ── -->
  <div class="modal-backdrop" id="handoff" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="handoff-title">
      <button class="modal-close" id="handoff-close" title="Close">&times;</button>
      <h2 id="handoff-title">Ask a human trainer</h2>
      <p class="handoff-lead">
        Leave your email and a trainer will follow up on this question.
      </p>
      <p class="handoff-q" id="handoff-question"></p>

      <label class="handoff-label" for="handoff-email">Your email</label>
      <input class="handoff-input" id="handoff-email" type="email"
             placeholder="name@company.com" autocomplete="email">
      <button class="handoff-send" id="handoff-send">Send to trainer</button>

      <p class="handoff-done" id="handoff-done" hidden>
        Sent. A trainer will follow up by email.
      </p>
    </div>
  </div>

  <!-- Signed-in user badge (Azure Static Web Apps only) -->
  <div class="user-badge" id="agent-user" hidden>
    <span id="agent-user-name"></span> &middot; <a href="/logout">Sign out</a>
  </div>

  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
  <script src="js/main.js"></script>
</body>
</html>
